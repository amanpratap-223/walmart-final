services:
  # 1. Main Web Service (Node.js + React)
  - type: web
    name: walmart-main
    env: node
    plan: free
    buildCommand: "npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # You will provide this in the Render Dashboard
      - key: OPENAI_API_KEY
        sync: false # You will provide this in the Render Dashboard
      - key: JWT_SECRET
        sync: false # You will provide this in the Render Dashboard

  # 2. AI Recommender (Python)
  - type: web
    name: walmart-ai-recommender
    env: python
    plan: free
    buildCommand: "cd ai-recommender && pip install -r requirements.txt"
    startCommand: "cd ai-recommender && gunicorn ai_recommender:app"
    envVars:
      - key: MAIN_API_URL
        fromService:
          type: web
          name: walmart-main
          envVarKey: RENDER_EXTERNAL_URL

  # 3. AI Search Engine (Python)
  - type: web
    name: walmart-ai-search
    env: python
    plan: free
    buildCommand: "cd ai-search-engine-flask && pip install -r requirements.txt"
    startCommand: "cd ai-search-engine-flask && gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
